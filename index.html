const tod=()=>{const d=new Date();d.setHours(0,0,0,0);return d;};
const addM=(d,m)=>{const r=new Date(d);r.setMonth(r.getMonth()+m);return r;};
const kfmt=d=>d?new Date(d).toLocaleDateString("ko-KR",{year:"numeric",month:"long",day:"numeric"}):"-";
const kfmtShort=d=>d?`${new Date(d).getFullYear()}.${String(new Date(d).getMonth()+1).padStart(2,"0")}.${String(new Date(d).getDate()).padStart(2,"0")}`:"-";
const diffD=(a,b)=>Math.ceil((new Date(b)-new Date(a))/86400000);
const uid=()=>Math.random().toString(36).slice(2,9);
const addDays=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r;};

function calcAnnualLeave(s){
  if(!s)return 0;
  const hire=new Date(s);hire.setHours(0,0,0,0);
  const days=(tod()-hire)/86400000,yrs=days/365;
  if(yrs<1)return Math.min(Math.floor(days/30),11);
  return Math.min(15+Math.floor((Math.floor(yrs)-1)/2),25);
}

function getInfo(s){
  if(!s)return null;
  const hire=new Date(s);hire.setHours(0,0,0,0);
  const td=tod(),oy=new Date(hire);oy.setFullYear(hire.getFullYear()+1);
  if(td<oy)return null;
  let ann=new Date(hire);ann.setFullYear(td.getFullYear());
  if(ann>td)ann.setFullYear(td.getFullYear()-1);
  const exp=addM(ann,12);
  const fst=addDays(addM(exp,-6),-10);
  const snd=addDays(addM(exp,-2),-10);
  return{ann,exp,fst,snd,period:ann.toISOString().split("T")[0]};
}

function getStatus(emp,hist){
  const info=getInfo(emp.hireDate),td=tod();
  if(!info)return{tag:"1년 미만",color:"#94a3b8",bg:"#f1f5f9",info:null};
  const{exp,fst,snd,period}=info;
  const s1=hist.some(h=>h.empId===emp.id&&h.type==="1차"&&h.period===period);
  const s2=hist.some(h=>h.empId===emp.id&&h.type==="2차"&&h.period===period);
  if(td>=exp)return{tag:"만료됨",color:"#94a3b8",bg:"#f1f5f9",info,s1,s2};
  if(td>=snd)return s2?{tag:"2차 완료",color:"#059669",bg:"#dcfce7",info,s1,s2}:{tag:"2차 촉진 필요",color:"#dc2626",bg:"#fef2f2",info,s1,s2,send:"2차",urgent:true};
  if(td>=fst)return s1?{tag:"1차 완료",color:"#2563eb",bg:"#eff6ff",info,s1,s2}:{tag:"1차 촉진 필요",color:"#ea580c",bg:"#fff7ed",info,s1,s2,send:"1차",urgent:true};
  return{tag:`1차까지 D-${diffD(td,fst)}`,color:"#64748b",bg:"#f8fafc",info,s1,s2};
}

function Badge({tag,color,bg}){return <span style={{background:bg,color,padding:"3px 10px",borderRadius:20,fontSize:12,fontWeight:700,border:`1px solid ${color}33`,whiteSpace:"nowrap"}}>{tag}</span>;}

function Modal({title,onClose,children,wide}){
  return <div onClick={e=>{if(e.target===e.currentTarget)onClose();}} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999,padding:16}}>
    <div style={{background:"#fff",borderRadius:16,padding:28,width:"100%",maxWidth:wide?680:460,maxHeight:"90vh",overflowY:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h2 style={{margin:0,fontSize:17,fontWeight:700}}>{title}</h2>
        <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#9ca3af",padding:0,lineHeight:1}}>✕</button>
      </div>
      {children}
    </div>
  </div>;
}

function LockScreen({onUnlock}){
  const[pw,setPw]=useState(""),[ err,setErr]=useState(false);
  const stored=localStorage.getItem(PW_KEY);
  const check=()=>{
    if(!stored){localStorage.setItem(PW_KEY,pw);onUnlock();return;}
    if(pw===stored)onUnlock();else{setErr(true);setPw("");}
  };
  return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#f1f5f9"}}>
    <div style={{...card,maxWidth:340,width:"100%",textAlign:"center",padding:40,marginBottom:0}}>
      <div style={{fontSize:48,marginBottom:16}}>📅</div>
      <h2 style={{margin:"0 0 6px",fontSize:20,fontWeight:800}}>연차촉진 관리시스템</h2>
      <p style={{margin:"0 0 28px",fontSize:13,color:"#9ca3af"}}>{stored?"비밀번호를 입력하세요":"처음 사용하시나요? 비밀번호를 설정해 주세요"}</p>
      <input type="password" value={pw} onChange={e=>{setPw(e.target.value);setErr(false);}} onKeyDown={e=>e.key==="Enter"&&check()} placeholder="비밀번호" style={{...inp,textAlign:"center",marginBottom:10,letterSpacing:4}}/>
      {err&&<p style={{color:"#dc2626",fontSize:13,margin:"0 0 10px"}}>비밀번호가 올바르지 않습니다.</p>}
      <button onClick={check} style={{...btnP,width:"100%",padding:"11px"}}>{stored?"로그인":"비밀번호 설정 후 시작"}</button>
    </div>
  </div>;
}

function EmpFormModal({initial,onSave,onClose}){
  const[f,setF]=useState(initial?{name:initial.name||"",empNo:initial.empNo||"",email:initial.email||"",department:initial.department||"",hireDate:initial.hireDate||""}:{name:"",empNo:"",email:"",department:"",hireDate:""});
  const set=k=>e=>setF(p=>({...p,[k]:e.target.value}));
  const preview=f.hireDate?calcAnnualLeave(f.hireDate):null;
  const months=f.hireDate?Math.floor((tod()-new Date(f.hireDate))/86400000/30):0;
  const save=()=>{if(!f.name.trim()||!f.email.trim()||!f.hireDate){alert("이름, 이메일, 입사일은 필수입니다.");return;}onSave(f);};
  return <Modal title={initial?"직원 정보 수정":"직원 추가"} onClose={onClose}>
    {[{label:"이름 *",key:"name",type:"text",ph:"홍길동"},{label:"사번",key:"empNo",type:"text",ph:"2210009"},{label:"이메일 *",key:"email",type:"email",ph:"hong@company.com"},{label:"부서",key:"department",type:"text",ph:"HR팀"},{label:"입사일 *",key:"hireDate",type:"date"}].map(({label,key,type,ph})=>(
      <div key={key} style={{marginBottom:14}}><label style={lbl}>{label}</label><input type={type} value={f[key]} onChange={set(key)} placeholder={ph||""} style={inp}/></div>
    ))}
    {preview!==null&&<div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:8,padding:"12px 14px",marginBottom:14}}>
      <p style={{margin:"0 0 4px",fontSize:13,color:"#1e40af",fontWeight:700}}>📊 발생 연차 자동 계산: {preview}일</p>
      <p style={{margin:0,fontSize:12,color:"#3b82f6"}}>입사 후 {months}개월 기준 · 사용 연차는 촉진 발송 시 입력합니다</p>
    </div>}
    <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
      <button onClick={onClose} style={btnG}>취소</button>
      <button onClick={save} style={btnP}>저장</button>
    </div>
  </Modal>;
}

    const body=encodeURIComponent(
`안녕하세요, HR팀 ${sett.hrName||"담당자"}입니다.
미사용 연차유급휴가일수 관련하여 아래와 같이 안내 드립니다.

ü  미사용연차 : ${remain}일


위 내용과 관련하여 __(1)미사용 연차유급휴가일수 지정 요청서__와 __(2)사용시기 계획통보서__를 첨부파일로 보내 드리니 확인 부탁드리며,
미사용연차 ${remain}일에 대한 사용시기 계획통보서를 작성하여 ${deadlineStr} 전까지 제출해주시기 바랍니다.
해당 서류는 출력하셔서 자필로 작성 후 원본 제출 부탁드립니다.

관련하여 문의사항이 있을 경우 저에게 말씀 주세요.
감사합니다.`);
    window.location.href=`mailto:${emp.email}?subject=${subj}&body=${body}`;
  };

  return <Modal title={`${type} 촉진 문서 발송`} onClose={onClose} wide>
    <p style={{margin:"-10px 0 16px",color:"#6b7280",fontSize:13}}>{emp.name}{emp.department?` · ${emp.department}`:""} ({emp.email})</p>
    <div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:10,padding:16,marginBottom:16}}>
      <p style={{margin:"0 0 12px",fontWeight:700,fontSize:13}}>📊 연차 현황 입력 (시프티에서 확인 후 입력)</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:8}}>
        <div style={{textAlign:"center",background:"#fff",borderRadius:8,padding:"12px 6px",border:"1px solid #e5e7eb"}}>
          <p style={{margin:"0 0 4px",fontSize:11,color:"#9ca3af"}}>발생 연차 [A]</p>
          <p style={{margin:"0 0 2px",fontSize:24,fontWeight:800,color:"#1e40af"}}>{annual}</p>
          <p style={{margin:0,fontSize:10,color:"#93c5fd"}}>자동 계산</p>
        </div>
        <div style={{textAlign:"center",background:"#fff",borderRadius:8,padding:"12px 6px",border:"2px solid #fbbf24"}}>
          <p style={{margin:"0 0 4px",fontSize:11,color:"#9ca3af"}}>사용 연차 [B]</p>
          <input type="number" min="0" max={annual} value={usedLeave} onChange={e=>setUsedLeave(e.target.value)} placeholder="0"
            style={{width:"100%",border:"none",textAlign:"center",fontSize:22,fontWeight:800,color:"#d97706",background:"transparent",outline:"none"}}/>
          <p style={{margin:0,fontSize:10,color:"#fbbf24"}}>✏️ 직접 입력</p>
        </div>
        <div style={{textAlign:"center",background:"#fff",borderRadius:8,padding:"12px 6px",border:"1px solid #e5e7eb"}}>
          <p style={{margin:"0 0 4px",fontSize:11,color:"#9ca3af"}}>미사용 [A-B]</p>
          <p style={{margin:"0 0 2px",fontSize:24,fontWeight:800,color:"#dc2626"}}>{remain}</p>
          <p style={{margin:0,fontSize:10,color:"#fca5a5"}}>자동 계산</p>
        </div>
      </div>
      <p style={{margin:0,fontSize:11,color:"#9ca3af"}}>💡 사용 연차 입력 → 미사용 연차 자동 반영 → 문서에 포함됩니다.</p>
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:12}}>
      <button onClick={openDoc} style={{width:"100%",padding:"11px",background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:600,color:"#374151",textAlign:"center"}}>
        📄 문서 미리보기 · PDF 저장 (새 탭)
      </button>
      <button onClick={openEmail} style={{...btnP,width:"100%",padding:"11px",textAlign:"center"}}>
        📧 이메일 초안 열기 ({emp.email})
      </button>
    </div>
    <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:8,padding:"10px 14px",marginBottom:14}}>
      <p style={{margin:0,fontSize:12,color:"#92400e"}}>📎 이메일 초안이 열리면 PDF를 저장 후 직접 첨부해 주세요.</p>
    </div>
    <div style={{borderTop:"1px solid #e5e7eb",paddingTop:14}}>
      <p style={{margin:"0 0 10px",fontSize:12,color:"#9ca3af"}}>이메일 발송 완료 후 아래 버튼으로 이력을 기록하세요.</p>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
        <button onClick={onClose} style={btnG}>닫기</button>
        <button onClick={()=>onConfirm(Number(usedLeave)||0)} style={{...btnP,background:"#059669"}}>✅ 발송 완료 처리</button>
      </div>
    </div>
  </Modal>;
}

function App(){
  const[unlocked,setUnlocked]=useState(false);
  const[emps,setEmps]=useState([]);
  const[hist,setHist]=useState([]);
  const[sett,setSett]=useState({company:"",hrName:"",hrPhone:""});
  const[tab,setTab]=useState("dash");
  const[empModal,setEmpModal]=useState(null);
  const[sendModal,setSendModal]=useState(null);
  const[filter,setFilter]=useState("all");
  const[settSaved,setSettSaved]=useState(false);

  useEffect(()=>{
    if(!unlocked)return;
    try{const e=localStorage.getItem(EMPS_KEY);if(e)setEmps(JSON.parse(e));}catch(_){}
    try{const h=localStorage.getItem(HIST_KEY);if(h)setHist(JSON.parse(h));}catch(_){}
    try{const s=localStorage.getItem(SETT_KEY);if(s)setSett(JSON.parse(s));}catch(_){}
  },[unlocked]);

  const saveEmps=v=>{setEmps(v);localStorage.setItem(EMPS_KEY,JSON.stringify(v));};
  const saveHist=v=>{setHist(v);localStorage.setItem(HIST_KEY,JSON.stringify(v));};
  const saveSett=v=>{setSett(v);localStorage.setItem(SETT_KEY,JSON.stringify(v));setSettSaved(true);setTimeout(()=>setSettSaved(false),2000);};
  const addEmp=f=>{saveEmps([...emps,{...f,id:uid(),usedLeave:0}]);setEmpModal(null);};
  const editEmp=f=>{saveEmps(emps.map(e=>e.id===empModal.emp.id?{...e,...f}:e));setEmpModal(null);};
  const deleteEmp=id=>{if(!window.confirm("삭제하시겠습니까?"))return;saveEmps(emps.filter(e=>e.id!==id));};
  const confirmSend=(usedLeave)=>{
    const{emp,type}=sendModal;const info=getInfo(emp.hireDate);if(!info)return;
    saveEmps(emps.map(e=>e.id===emp.id?{...e,usedLeave}:e));
    saveHist([...hist,{id:uid(),empId:emp.id,empName:emp.name,type,period:info.period,date:new Date().toISOString(),usedLeave}]);
    setSendModal(null);
  };
  const changePw=()=>{const np=window.prompt("새 비밀번호를 입력하세요");if(np&&np.trim()){localStorage.setItem(PW_KEY,np.trim());alert("변경되었습니다.");}};

  if(!unlocked)return <LockScreen onUnlock={()=>setUnlocked(true)}/>;

  const empWS=emps.map(e=>{const annual=calcAnnualLeave(e.hireDate);const remain=Math.max(annual-(Number(e.usedLeave)||0),0);return{...e,annual,remain,status:getStatus(e,hist)};});
  const urgent=empWS.filter(e=>e.status.urgent);
  const filtered=filter==="urgent"?urgent:filter==="done"?empWS.filter(e=>e.status.tag.includes("완료")):empWS;

  return <div style={{minHeight:"100vh",background:"#f1f5f9"}}>
    <div style={{background:"#0f172a",padding:"0 20px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",height:56}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:20}}>📅</span>
          <span style={{color:"#fff",fontWeight:800,fontSize:16}}>연차촉진 관리시스템</span>
          {sett.company&&<span style={{color:"#475569",fontSize:12,marginLeft:4}}>| {sett.company}</span>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {urgent.length>0&&<span style={{background:"#dc2626",color:"#fff",borderRadius:20,padding:"3px 12px",fontSize:12,fontWeight:700,animation:"pulse 2s infinite"}}>⚠ 촉진 필요 {urgent.length}명</span>}
          <button onClick={()=>setUnlocked(false)} style={{background:"none",border:"1px solid #334155",color:"#94a3b8",borderRadius:8,padding:"4px 10px",cursor:"pointer",fontSize:12}}>🔒 잠금</button>
        </div>
      </div>
    </div>

    <div style={{background:"#fff",borderBottom:"1px solid #e2e8f0",display:"flex"}}>
      {[["dash","📊 대시보드"],["emps","👥 직원 관리"],["hist","📋 이력"],["sett","⚙️ 설정"]].map(([k,v])=>(
        <button key={k} onClick={()=>setTab(k)} style={{background:"none",border:"none",padding:"13px 16px",cursor:"pointer",fontSize:13,fontWeight:tab===k?700:400,color:tab===k?"#1e40af":"#6b7280",borderBottom:tab===k?"2.5px solid #1e40af":"2.5px solid transparent",whiteSpace:"nowrap"}}>{v}</button>
      ))}
    </div>

    <div style={{padding:20}}>

      {tab==="dash"&&<div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:12,marginBottom:20}}>
          {[["전체 직원",emps.length,"#1e40af","#eff6ff","👥"],["촉진 필요",urgent.length,"#dc2626","#fef2f2","🚨"],
            ["이번달 만료",empWS.filter(e=>{const i=e.status.info;if(!i)return false;const m=new Date();return i.exp.getMonth()===m.getMonth()&&i.exp.getFullYear()===m.getFullYear();}).length,"#ea580c","#fff7ed","⏰"],
            ["처리 완료",empWS.filter(e=>e.status.tag.includes("완료")).length,"#059669","#f0fdf4","✅"],
          ].map(([k,v,c,bg,ico])=>(
            <div key={k} style={{background:bg,borderRadius:10,padding:16,borderLeft:`4px solid ${c}`}}>
              <p style={{margin:"0 0 4px",fontSize:11,color:c,fontWeight:600}}>{ico} {k}</p>
              <p style={{margin:0,fontSize:26,fontWeight:900,color:c,lineHeight:1}}>{v}<span style={{fontSize:12,fontWeight:400}}>명</span></p>
            </div>
          ))}
        </div>
        <div style={card}>
          <h3 style={{margin:"0 0 14px",fontSize:14,fontWeight:700}}>🚨 촉진 필요 직원</h3>
          {urgent.length===0?<div style={{textAlign:"center",padding:"28px 0",color:"#9ca3af"}}>
            <div style={{fontSize:32,marginBottom:8}}>✅</div>
            <p style={{margin:0,fontSize:14}}>촉진이 필요한 직원이 없습니다.</p>
          </div>:urgent.map(emp=>(
            <div key={emp.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,padding:"12px 0",borderBottom:"1px solid #f3f4f6",flexWrap:"wrap"}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                  <span style={{fontWeight:700,fontSize:14}}>{emp.name}</span>
                  {emp.department&&<span style={{fontSize:11,color:"#9ca3af",background:"#f3f4f6",padding:"2px 7px",borderRadius:20}}>{emp.department}</span>}
                  <Badge {...emp.status}/>
                </div>
                <div style={{fontSize:11,color:"#9ca3af",display:"flex",gap:8,flexWrap:"wrap"}}>
                  <span>📊 발생 {emp.annual}일</span><span>✅ 사용 {emp.usedLeave||0}일</span><span>🏖 미사용 {emp.remain}일</span>
                  {emp.status.info&&<span style={{color:"#dc2626",fontWeight:700}}>D-{diffD(tod(),emp.status.info.exp)}</span>}
                </div>
              </div>
              <button onClick={()=>setSendModal({emp,type:emp.status.send})} style={{...btnP,fontSize:12,padding:"7px 14px",whiteSpace:"nowrap"}}>{emp.status.send} 발송 →</button>
            </div>
          ))}
        </div>
      </div>}

      {tab==="emps"&&<div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
          <div style={{display:"flex",gap:6}}>
            {[["urgent","촉진 필요"],["all","전체"],["done","완료"]].map(([v,l])=>(
              <button key={v} onClick={()=>setFilter(v)} style={{background:filter===v?"#1e40af":"#fff",color:filter===v?"#fff":"#374151",border:"1px solid "+(filter===v?"#1e40af":"#e5e7eb"),borderRadius:8,padding:"6px 12px",cursor:"pointer",fontWeight:600,fontSize:12}}>{l}</button>
            ))}
          </div>
          <button onClick={()=>setEmpModal({mode:"add"})} style={{...btnP,fontSize:13}}>+ 직원 추가</button>
        </div>
        {filtered.length===0?<div style={{...card,textAlign:"center",padding:40,color:"#9ca3af"}}>
          <div style={{fontSize:32,marginBottom:8}}>👥</div>
          <p style={{margin:0,fontSize:14}}>{filter==="urgent"?"촉진이 필요한 직원이 없습니다.":"직원이 없습니다."}</p>
        </div>:filtered.map(emp=>(
          <div key={emp.id} style={card}>
            <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:10,flexWrap:"wrap"}}>
              <div style={{flex:1,minWidth:180}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5,flexWrap:"wrap"}}>
                  <span style={{fontWeight:700,fontSize:15}}>{emp.name}</span>
                  {emp.empNo&&<span style={{fontSize:11,color:"#9ca3af"}}>#{emp.empNo}</span>}
                  {emp.department&&<span style={{fontSize:11,color:"#6b7280",background:"#f3f4f6",padding:"2px 7px",borderRadius:20}}>{emp.department}</span>}
                  <Badge {...emp.status}/>
                </div>
                <div style={{fontSize:11,color:"#9ca3af",display:"flex",gap:10,flexWrap:"wrap"}}>
                  <span>📧 {emp.email}</span><span>📅 {kfmt(emp.hireDate)}</span>
                  <span>📊 발생 {emp.annual}일</span><span>✅ 사용 {emp.usedLeave||0}일</span><span>🏖 미사용 {emp.remain}일</span>
                  {emp.status.info&&<span>⏰ 만료 {kfmt(emp.status.info.exp)}</span>}
                </div>
              </div>
              <div style={{display:"flex",gap:6,flexShrink:0,flexWrap:"wrap"}}>
                <button onClick={()=>setSendModal({emp,type:"1차"})} style={{background:emp.status.send==="1차"?"#dc2626":"#fff",color:emp.status.send==="1차"?"#fff":"#6b7280",border:"1px solid "+(emp.status.send==="1차"?"#dc2626":"#d1d5db"),borderRadius:8,padding:"6px 12px",cursor:"pointer",fontWeight:700,fontSize:12}}>
                  {emp.status.send==="1차"?"🔴 1차 발송":"1차 발송"}
                </button>
                <button onClick={()=>setSendModal({emp,type:"2차"})} style={{background:emp.status.send==="2차"?"#dc2626":"#fff",color:emp.status.send==="2차"?"#fff":"#6b7280",border:"1px solid "+(emp.status.send==="2차"?"#dc2626":"#d1d5db"),borderRadius:8,padding:"6px 12px",cursor:"pointer",fontWeight:700,fontSize:12}}>
                  {emp.status.send==="2차"?"🔴 2차 발송":"2차 발송"}
                </button>
                <button onClick={()=>setEmpModal({mode:"edit",emp})} style={{...btnG,padding:"6px 10px",fontSize:12}}>수정</button>
                <button onClick={()=>deleteEmp(emp.id)} style={{background:"#fff",color:"#dc2626",border:"1px solid #fca5a5",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:12}}>삭제</button>
              </div>
            </div>
          </div>
        ))}
      </div>}

      {tab==="hist"&&<div style={card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <h3 style={{margin:0,fontSize:14,fontWeight:700}}>📋 촉진 문서 발송 이력</h3>
          {hist.length>0&&<span style={{fontSize:12,color:"#9ca3af"}}>총 {hist.length}건</span>}
        </div>
        {hist.length===0?<div style={{textAlign:"center",padding:32,color:"#9ca3af"}}><p style={{margin:0}}>아직 발송 이력이 없습니다.</p></div>
        :[...hist].reverse().map(h=>(
          <div key={h.id} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 0",borderBottom:"1px solid #f3f4f6",flexWrap:"wrap"}}>
            <span style={{background:h.type==="1차"?"#fff7ed":"#fef2f2",color:h.type==="1차"?"#ea580c":"#dc2626",border:`1px solid ${h.type==="1차"?"#fdba74":"#fca5a5"}`,borderRadius:8,padding:"3px 10px",fontWeight:700,fontSize:12,whiteSpace:"nowrap"}}>{h.type}</span>
            <div style={{flex:1}}>
              <p style={{margin:"0 0 2px",fontWeight:600,fontSize:13}}>{h.empName}</p>
              <p style={{margin:0,fontSize:11,color:"#9ca3af"}}>연차 기간: {h.period}{h.usedLeave!==undefined&&` · 사용 연차: ${h.usedLeave}일`}</p>
            </div>
            <p style={{margin:0,fontSize:11,color:"#9ca3af",whiteSpace:"nowrap"}}>{new Date(h.date).toLocaleDateString("ko-KR",{year:"numeric",month:"long",day:"numeric"})}</p>
          </div>
        ))}
      </div>}

      {tab==="sett"&&<div style={card}>
        <h3 style={{margin:"0 0 6px",fontSize:14,fontWeight:700}}>⚙️ 기본 설정</h3>
        <p style={{margin:"0 0 18px",fontSize:12,color:"#6b7280"}}>촉진 문서에 자동으로 들어갈 정보를 설정하세요.</p>
        {[{label:"회사명",key:"company",ph:"(주)퍼포먼스바이티비더블유에이"},{label:"인사담당자 이름",key:"hrName",ph:"이나경"},{label:"인사팀 연락처",key:"hrPhone",ph:"02-1234-5678"}].map(({label,key,ph})=>(
          <div key={key} style={{marginBottom:14}}><label style={lbl}>{label}</label><input value={sett[key]||""} onChange={e=>setSett(p=>({...p,[key]:e.target.value}))} placeholder={ph} style={inp}/></div>
        ))}
        <button onClick={()=>saveSett(sett)} style={{...btnP,marginTop:4,marginBottom:16}}>{settSaved?"✅ 저장되었습니다":"설정 저장"}</button>
        <hr style={{border:"none",borderTop:"1px solid #e5e7eb",margin:"0 0 16px"}}/>
        <h3 style={{margin:"0 0 6px",fontSize:14,fontWeight:700}}>🔒 보안</h3>
        <p style={{margin:"0 0 12px",fontSize:12,color:"#6b7280"}}>접속 비밀번호를 변경할 수 있습니다.</p>
        <button onClick={changePw} style={btnG}>비밀번호 변경</button>
      </div>}
    </div>

    {empModal&&<EmpFormModal initial={empModal.emp} onSave={empModal.mode==="add"?addEmp:editEmp} onClose={()=>setEmpModal(null)}/>}
    {sendModal&&<SendModal emp={sendModal.emp} type={sendModal.type} sett={sett} onConfirm={confirmSend} onClose={()=>setSendModal(null)}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
